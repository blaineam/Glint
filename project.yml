name: Glint
options:
  bundleIdPrefix: com.blainemiller
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.3"
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  Glint:
    type: application
    platform: macOS
    sources:
      - Glint/Sources
      - Glint/Resources/Assets.xcassets
    info:
      path: Glint/Resources/Info.plist
      properties:
        CFBundleName: Glint
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "1.3.2"
        CFBundleVersion: "9"
        LSUIElement: true
        NSHumanReadableCopyright: "Copyright © 2026 Blaine Miller. MIT License."
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
    entitlements:
      path: Glint/Resources/Glint.entitlements
      properties:
        com.apple.security.app-sandbox: false
    dependencies:
      - sdk: IOKit.framework
      - sdk: CoreAudio.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        PRODUCT_BUNDLE_IDENTIFIER: com.blainemiller.Glint
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
        SWIFT_OBJC_BRIDGING_HEADER: Glint/Sources/App/Glint-Bridging-Header.h
        SWIFT_STRICT_CONCURRENCY: minimal
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        OTHER_LDFLAGS: ["-F/System/Library/PrivateFrameworks", "-framework", "DisplayServices"]
