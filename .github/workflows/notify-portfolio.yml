# Drop this file at `.github/workflows/notify-portfolio.yml` in each app
# repo (Blip, Glint, …) to trigger the portfolio's `mirror-app-docs`
# workflow the moment the landing page changes, instead of waiting for
# the portfolio's daily cron.
#
# Requires a PAT stored as `PORTFOLIO_DISPATCH_TOKEN` in this repo's
# secrets. The default `GITHUB_TOKEN` is scoped to the repo running the
# workflow and cannot dispatch to another repo, even when both are
# public. Use a fine-grained PAT scoped to `blaineam/blaineam.github.io`
# with `Contents: read-write`, or a classic PAT with `public_repo`.

name: Notify portfolio to mirror docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger mirror-app-docs in portfolio
        env:
          GH_TOKEN: ${{ secrets.PORTFOLIO_DISPATCH_TOKEN }}
        run: |
          gh api -X POST \
            /repos/blaineam/blaineam.github.io/dispatches \
            -f event_type=mirror-app-docs
